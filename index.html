<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <title>塔罗占卜 · 星盘密语</title>
  <style>
    :root {
      --bg: #07050b;
      --panel: rgba(15, 11, 28, 0.72);
      --border: rgba(214, 171, 88, 0.3);
      --text: #f1e8d2;
      --muted: #c9bfa6;
      --accent: #d6ab58;
      --accent-2: #8c6a31;
      --danger: #ff98b6;
      --ok: #7ff5c6;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      --fps-steps: 60;
      --font-title: "Cinzel", ui-serif, "Times New Roman", "Georgia", serif;
      --font-cn: "ZCOOL XiaoWei", "Noto Serif SC", serif;
    }

    html.is-mobile {
      --fps-steps: 30;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(130, 10, 40, 0.26), transparent 42%),
        radial-gradient(circle at 84% 10%, rgba(94, 8, 28, 0.2), transparent 44%),
        linear-gradient(160deg, #4a0010 0%, #1a0008 100%);
      overflow-x: hidden;
      position: relative;
    }

    .cn, .q-label, textarea, button, .hint, .reading, .formation-desc, .modal-content, .modal-title {
      font-family: var(--font-cn);
    }

    .label-song {
      font-family: var(--font-cn) !important;
      letter-spacing: 0.06em;
    }

    canvas {
      will-change: transform;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(244,218,160,.38), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 25%, rgba(212,175,106,.32), transparent 60%),
        radial-gradient(1.8px 1.8px at 40% 70%, rgba(90,8,28,.35), transparent 60%),
        radial-gradient(1.2px 1.2px at 85% 60%, rgba(212,175,106,.22), transparent 60%);
      pointer-events: none;
      opacity: .55;
    }

    .particle-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .sand-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
      border-radius: inherit;
    }

    .sand-grain {
      position: absolute;
      top: -10px;
      left: var(--x);
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.6);
      box-shadow: 0 0 6px rgba(212, 175, 55, 0.35);
      opacity: .58;
      animation: sandFall var(--dur) linear infinite;
      animation-delay: var(--delay);
      will-change: transform, opacity;
    }

    @keyframes sandFall {
      0% { transform: translate3d(0, -8px, 0); opacity: 0; }
      8% { opacity: .58; }
      100% { transform: translate3d(var(--drift), 108%, 0); opacity: 0; }
    }

    .particle {
      position: absolute;
      top: -10px;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      left: var(--x);
      background: radial-gradient(circle,
        rgba(255,236,200,.95) 0%,
        rgba(214,171,88,.65) 38%,
        rgba(90,8,28,.35) 68%,
        transparent 78%);
      filter: blur(.15px);
      opacity: .75;
      animation:
        fall var(--dur) linear infinite,
        twinkle var(--tw) ease-in-out infinite;
      animation-delay: var(--delay), calc(var(--delay) * -0.3);
      will-change: transform, opacity;
    }

    .particle--trail {
      box-shadow:
        0 0 10px 2px rgba(214, 171, 88, 0.55),
        0 0 4px rgba(90, 8, 28, 0.35),
        0 22px 28px -8px rgba(214, 171, 88, 0.22);
    }

    .particle--trail::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 55%;
      width: 2px;
      height: calc(var(--size) * 8);
      transform: translateX(-50%);
      background: linear-gradient(
        to bottom,
        rgba(214, 171, 88, 0.55),
        rgba(74, 0, 16, 0.15),
        transparent
      );
      border-radius: 2px;
      opacity: .55;
      filter: blur(1.2px);
      pointer-events: none;
    }

    @keyframes fall {
      0% { transform: translate3d(0, -12px, 0); opacity: 0; }
      10% { opacity: var(--peak, 0.85); }
      78% { opacity: calc(var(--peak, 0.85) * 0.85); }
      100% { transform: translate3d(var(--drift), 105vh, 0); opacity: 0; }
    }

    @keyframes twinkle {
      0%, 100% {
        filter: blur(0.35px) brightness(0.7) drop-shadow(0 0 0 rgba(212, 175, 106, 0));
      }
      50% {
        filter: blur(0.05px) brightness(1.35) drop-shadow(0 0 6px rgba(212, 175, 106, 0.55));
      }
    }

    .container {
      width: min(940px, calc(100vw - 32px));
      margin: 24px auto 40px;
      position: relative;
      z-index: 1;
    }

    .title {
      text-align: center;
      margin: 8px 0 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-shadow:
        0 0 6px rgba(255, 220, 140, 0.5),
        0 0 14px rgba(214, 171, 88, 0.55),
        0 0 26px rgba(214, 171, 88, 0.35);
      font-family: var(--font-title);
    }

    .subtitle {
      text-align: center;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
      font-family: var(--font-cn);
      letter-spacing: 0.08em;
      text-shadow:
        0 0 4px rgba(255, 220, 140, 0.35),
        0 0 10px rgba(214, 171, 88, 0.3);
    }

    .panel {
      background: linear-gradient(160deg, #2a0d0d 0%, #1a0808 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .panel + .panel { margin-top: 14px; }

    .zodiac {
      width: 260px;
      aspect-ratio: 1 / 1;
      border: 1px dashed rgba(212, 175, 106, 0.38);
      border-radius: 50%;
      margin: 4px auto 16px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 0 50px rgba(74, 0, 16, 0.35),
        inset 0 0 24px rgba(214, 171, 88, 0.08),
        0 0 42px rgba(0, 0, 0, 0.55);
    }

    .mandala-bg {
      position: absolute;
      inset: -6%;
      width: 112%;
      height: 112%;
      pointer-events: none;
      opacity: 0.42;
      mix-blend-mode: screen;
    }

    .mandala-outer {
      transform-origin: 100px 100px;
      animation: spinCw 120s linear infinite;
    }

    .mandala-inner {
      transform-origin: 100px 100px;
      animation: spinCcw 90s linear infinite;
    }

    @keyframes spinCw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinCcw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

    .zodiac::before, .zodiac::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      border: 1px solid rgba(120, 60, 80, 0.45);
      z-index: 1;
    }

    .zodiac::after {
      inset: 30%;
      border-color: rgba(212, 175, 106, 0.35);
    }

    .zodiac i {
      position: absolute;
      z-index: 2;
      width: 4px;
      height: 4px;
      background: rgba(244, 218, 160, 0.9);
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(214, 171, 88, 0.75);
    }

    .q-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      background: rgba(8, 7, 16, 0.75);
      color: var(--text);
      border: 1px solid rgba(214, 171, 88, 0.32);
      border-radius: 12px;
      padding: 12px;
      resize: vertical;
      outline: none;
      font-size: 14px;
      line-height: 1.5;
      font-family: var(--font-cn);
    }

    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(214, 171, 88, .15); }

    .actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 1px solid rgba(214, 171, 88, 0.55);
      background: linear-gradient(135deg, rgba(214, 171, 88, .22), rgba(73, 53, 24, .25));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
      font-weight: 600;
    }

    button:hover { transform: translateY(-1px); border-color: var(--accent); box-shadow: 0 8px 18px rgba(214, 171, 88, .2); }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .card-wrap {
      margin-top: 8px;
      min-height: 280px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      align-items: center;
    }

    .tarot-card {
      width: 100%;
      min-height: 240px;
      border-radius: 14px;
      border: 2px solid rgba(212, 175, 106, 0.72);
      background:
        radial-gradient(ellipse 120% 90% at 18% 12%, rgba(212, 175, 106, 0.14), transparent 52%),
        radial-gradient(ellipse 85% 70% at 88% 78%, rgba(74, 0, 16, 0.42), transparent 48%),
        radial-gradient(circle at 50% 110%, rgba(26, 0, 8, 0.9), transparent 55%),
        linear-gradient(168deg, #1c0a10 0%, #12060c 38%, #0a0408 100%);
      padding: 16px;
      position: relative;
      box-shadow:
        0 0 15px rgba(212,175,55,0.3),
        inset 0 0 10px rgba(212,175,55,0.05),
        inset 0 0 0 1px rgba(74, 0, 16, 0.55),
        inset 0 0 48px rgba(0, 0, 0, 0.55),
        inset 0 -20px 40px rgba(74, 0, 16, 0.25),
        0 0 0 1px rgba(212, 175, 106, 0.12),
        0 18px 36px rgba(0, 0, 0, 0.6);
      perspective: 1000px;
    }

    .tarot-card::after {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: 9px;
      bottom: 9px;
      border: 1px solid rgba(212, 175, 106, 0.42);
      border-radius: 10px;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(212, 175, 106, 0.12) 0%, transparent 32%, transparent 68%, rgba(74, 0, 16, 0.22) 100%);
    }

    .card-inner {
      position: absolute;
      inset: 14px;
      transform-style: preserve-3d;
      transition: transform .8s cubic-bezier(.2,.7,.2,1);
    }

    .tarot-card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      backface-visibility: hidden;
      border: 1px solid rgba(212, 175, 106, 0.28);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px;
      overflow: hidden;
    }

    .card-face::before {
      content: "";
      position: absolute;
      inset: 6px;
      z-index: 0;
      border-radius: 6px;
      pointer-events: none;
      border: 1px solid rgba(74, 0, 16, 0.35);
      box-shadow:
        inset 0 0 0 1px rgba(212, 175, 106, 0.15),
        inset 0 0 24px rgba(0, 0, 0, 0.35);
    }

    .card-face::after {
      content: "";
      position: absolute;
      inset: 10px;
      z-index: 0;
      border-radius: 4px;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 5px,
          rgba(212, 175, 106, 0.04) 5px,
          rgba(212, 175, 106, 0.04) 6px
        );
      opacity: 0.35;
      mix-blend-mode: overlay;
    }

    .card-face > * {
      position: relative;
      z-index: 1;
    }

    .card-back {
      position: relative;
      background:
        radial-gradient(ellipse 80% 60% at 30% 25%, rgba(212, 175, 106, 0.16), transparent 55%),
        radial-gradient(ellipse 90% 70% at 70% 70%, rgba(74, 0, 16, 0.45), transparent 50%),
        linear-gradient(165deg, #140810 0%, #0a0408 100%);
      align-items: center;
      color: #e7d6ab;
      font-family: var(--font-title);
      letter-spacing: .15em;
      font-size: 13px;
    }

    .card-back .card-back-ornament {
      position: relative;
      z-index: 1;
      width: 56px;
      height: 56px;
      margin-bottom: 10px;
      opacity: 0.85;
      filter: drop-shadow(0 0 10px rgba(212, 175, 106, 0.35));
    }

    .card-front {
      transform: rotateY(180deg);
      background:
        radial-gradient(ellipse 95% 75% at 72% 18%, rgba(212, 175, 106, 0.12), transparent 45%),
        radial-gradient(ellipse 70% 60% at 18% 88%, rgba(74, 0, 16, 0.38), transparent 48%),
        linear-gradient(168deg, #1a0c12 0%, #10060a 55%, #0c0408 100%);
    }

    .card-state {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      margin-top: 58px;
    }

    .card-symbol-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      margin: 6px 0;
    }

    .card-symbol {
      width: 56px;
      height: 56px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(212, 175, 106, 0.42));
    }

    .card-symbol path,
    .card-symbol circle,
    .card-symbol line,
    .card-symbol polygon {
      stroke: #d4af6a;
      stroke-width: 1.35;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-symbol .sym-fill {
      fill: rgba(212, 175, 106, 0.12);
      stroke: #c9a052;
      stroke-width: 1;
    }

    .card-name {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .12em;
      margin-top: 4px;
      font-family: var(--font-cn);
      text-transform: uppercase;
      color: #f3e6c8;
      text-shadow: 0 0 14px rgba(212, 175, 106, 0.35);
    }

    .card-orient {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
      font-family: var(--font-cn);
    }

    .reading {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #f4efff;
      margin-top: 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.62);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 16px;
    }

    .modal.show { display: flex; }

    .modal-content {
      width: min(420px, 100%);
      background: rgba(14, 10, 28, .95);
      border: 1px solid rgba(162, 123, 255, .45);
      border: 1px solid rgba(214, 171, 88, .45);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: .04em;
    }

    .price {
      color: var(--danger);
      font-weight: 700;
      margin: 8px 0 10px;
    }

    .modal-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .ghost { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); }

    .tag-ok {
      display: inline-block;
      font-size: 12px;
      color: #09160f;
      background: var(--ok);
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .formation-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .formation-btn {
      text-align: left;
      min-height: 78px;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1.35;
      transition:
        transform 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
      background: linear-gradient(135deg, rgba(214, 171, 88, 0.22), rgba(73, 53, 24, 0.25));
      border-color: rgba(212, 175, 106, 0.55);
    }

    .formation-btn:hover:not(.active) {
      transform: translateY(-2px);
      border-color: rgba(228, 201, 122, 0.95);
      box-shadow:
        0 0 28px rgba(212, 175, 106, 0.42),
        0 0 2px rgba(212, 175, 106, 0.9),
        0 10px 22px rgba(0, 0, 0, 0.35);
      background: linear-gradient(135deg, rgba(214, 171, 88, 0.28), rgba(73, 53, 24, 0.32));
    }

    .formation-btn.active {
      border-color: #f0d37a;
      background: linear-gradient(135deg, rgba(214, 171, 88, 0.34), rgba(73, 53, 24, 0.38));
      box-shadow:
        0 0 0 2px rgba(212, 175, 106, 0.75),
        0 0 36px rgba(212, 175, 106, 0.32),
        inset 0 0 26px rgba(74, 0, 16, 0.35);
    }

    .formation-title {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-family: var(--font-cn);
      font-size: 17px;
      letter-spacing: 0.06em;
    }

    .formation-desc {
      display: block;
      font-size: 14px;
      color: rgba(241, 232, 210, 0.78);
      font-family: var(--font-cn);
      letter-spacing: 0.04em;
    }

    .entry {
      opacity: 0;
      transform: translateY(12px);
      animation: entryFade .8s ease forwards;
    }

    .entry.delay-1 { animation-delay: .15s; }
    .entry.delay-2 { animation-delay: .35s; }
    .entry.delay-3 { animation-delay: .55s; }
    .entry.delay-4 { animation-delay: .75s; }

    @keyframes entryFade {
      to { opacity: 1; transform: translateY(0); }
    }

    .draw-zone {
      position: relative;
      min-height: 250px;
      border-radius: 12px;
      border: 1px dashed rgba(214,171,88,.28);
      padding: 14px;
      overflow: hidden;
    }

    .proverb {
      position: relative;
      z-index: 1;
      margin: 2px 2px 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(212,175,106,.28);
      background: linear-gradient(145deg, rgba(45, 10, 46, 0.55), rgba(61, 10, 10, 0.48));
      box-shadow: inset 0 0 26px rgba(0,0,0,.35);
      color: rgba(241,232,210,.92);
      letter-spacing: .12em;
      text-align: center;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-cn);
      font-size: 1.3rem;
      letter-spacing: 0.16em;
    }

    .deck-stack {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 128px;
      height: 190px;
      opacity: 0;
      pointer-events: none;
    }

    .deck-stack.show {
      opacity: 1;
      animation: pulseDeck .8s ease-in-out infinite alternate;
    }

    .deck-stack .stack-card {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 1px solid rgba(214,171,88,.35);
      background: linear-gradient(160deg, #1a132f, #100c21);
      box-shadow: inset 0 0 12px rgba(214,171,88,.15);
    }

    .deck-stack .stack-card:nth-child(1) { transform: translate(-16px, -10px) rotate(-9deg); }
    .deck-stack .stack-card:nth-child(2) { transform: translate(-8px, -3px) rotate(-3deg); }
    .deck-stack .stack-card:nth-child(3) { transform: translate(0, 0) rotate(0deg); }
    .deck-stack .stack-card:nth-child(4) { transform: translate(8px, 4px) rotate(4deg); }
    .deck-stack .stack-card:nth-child(5) { transform: translate(15px, 9px) rotate(8deg); }

    @keyframes pulseDeck {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.03); }
    }

    .card-grid.revealed .tarot-card {
      animation: cardRise 1.2s cubic-bezier(.25,.7,.2,1) both;
    }

    .card-grid.revealed .tarot-card:nth-child(1) { animation-delay: 0s; }
    .card-grid.revealed .tarot-card:nth-child(2) { animation-delay: 0.3s; }
    .card-grid.revealed .tarot-card:nth-child(3) { animation-delay: 0.6s; }
    .card-grid.revealed .tarot-card:nth-child(n+4) { animation-delay: 0s; }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(30px) rotateY(90deg); }
      to { opacity: 1; transform: translateY(0) rotateY(0deg); }
    }

    /* Mobile perf: quantize animations to ~30fps */
    html.is-mobile .mandala-bg,
    html.is-mobile .mandala-outer,
    html.is-mobile .mandala-inner,
    html.is-mobile .entry,
    html.is-mobile .deck-stack.show,
    html.is-mobile .card-grid.revealed .tarot-card {
      animation-timing-function: steps(var(--fps-steps), end) !important;
    }

    html.is-mobile .particle {
      animation-timing-function:
        steps(var(--fps-steps), end),
        steps(var(--fps-steps), end) !important;
    }

    html.is-mobile .formation-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 560px) {
      .title { font-size: 26px; }
      .zodiac { width: 220px; }

            vx: Math.random() * 1.2 - 0.6,
            peak: 0.45 + Math.random() * 0.45,
            tw: Math.random() * 1.8 + 0.8,
            t: Math.random() * Math.PI * 2
          });
        }
        particleLayer.appendChild(p);
      }
    }

    function createSandFlow(targetLayer, count = 120) {
      if (!targetLayer) return;
      targetLayer.innerHTML = "";
      const finalCount = isMobileDevice ? Math.floor(count * 0.45) : count;
      for (let i = 0; i < finalCount; i++) {
        const dot = document.createElement("span");
        dot.className = "sand-grain";
        dot.style.setProperty("--x", `${Math.random() * 100}%`);
        dot.style.setProperty("--size", `${Math.random() * 1.7 + 0.6}px`);
        dot.style.setProperty("--dur", `${Math.random() * 14 + 10}s`);
        dot.style.setProperty("--delay", `${Math.random() * -18}s`);
        dot.style.setProperty("--drift", `${Math.random() * 14 - 7}px`);
        if (isMobileDevice) {
          dot.style.animation = "none";
          dot.style.left = "0";
          dot.style.top = "0";
          dot.style.willChange = "transform, opacity";
          mobileSand.push({
            el: dot,
            x: Math.random() * 100,
            y: Math.random() * 110 - 10,
            vy: Math.random() * 10 + 6,
            vx: Math.random() * 0.5 - 0.25
          });
        }
        targetLayer.appendChild(dot);
      }
    }

    function startMobileAnimationLoop() {
      if (!isMobileDevice || mobileAnimatorStarted) return;
      mobileAnimatorStarted = true;
      let last = 0;
      const frameMs = 1000 / 30;
      const tick = (now) => {
        if (!last) last = now;
        const dt = now - last;
        if (dt >= frameMs) {
          last = now;
          const step = dt / 1000;
          for (const p of mobileParticles) {
            p.y += p.vy * step;
            p.x += p.vx * step;
            if (p.y > 110) {
              p.y = -8;
              p.x = Math.random() * 100;
            }
            p.t += step / p.tw;
            const twinkle = 0.55 + 0.45 * Math.sin(p.t * Math.PI * 2);
            p.el.style.transform = `translate3d(${p.x.toFixed(2)}vw, ${p.y.toFixed(2)}vh, 0)`;
            p.el.style.opacity = `${(p.peak * twinkle).toFixed(3)}`;
          }
          for (const s of mobileSand) {
            s.y += s.vy * step;
            s.x += s.vx * step;
            if (s.y > 110) {
              s.y = -6;
              s.x = Math.random() * 100;
            }
            s.el.style.transform = `translate3d(${s.x.toFixed(2)}%, ${s.y.toFixed(2)}%, 0)`;
            s.el.style.opacity = "0.56";
          }
        }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }

    async function siliconFlowChat({ model, prompt, temperature = 0.9, max_tokens = 120 }) {
      const resp = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model,
          messages: [{ role: "user", content: prompt }],
          temperature,
          max_tokens
        })
      });

      if (!resp.ok) throw new Error(`API 请求失败：HTTP ${resp.status}`);
      const data = await resp.json();
      const text = data?.choices?.[0]?.message?.content?.trim();
      return text || "";
    }

    function cardNameList(cards) {
      return cards.map((c) => c.name + (c.orientation ? `（${c.orientation}）` : "")).join("、");
    }

    async function generateProverb(cards) {
      const prompt = `你是一位古老的占卜师，根据以下塔罗牌阵{${cardNameList(cards)}}，生成一句古典神秘风格的占卜谚语，15字以内，不要解释，只输出谚语本身`;
      const text = await siliconFlowChat({
        model: "deepseek-ai/DeepSeek-V3",
        prompt,
        temperature: 0.95,
        max_tokens: 60
      });
      if (text) return text.replace(/[\r\n]+/g, " ").trim();
      // fallback（无key或失败）：本地古典风短句
      const pool = ["星辉引路，心火自明", "旧梦将醒，新门将开", "暗潮既退，金光可至", "风止时，答案自现", "守一念，万象皆应"];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function normalizeProverbText(text) {
      const t = String(text || "").trim();
      if (!t) return "星辉低语，答案在你心间";
      // 去掉外层中英文引号，避免出现多层引号
      return t.replace(/^["'“‘]+|["'”’]+$/g, "");
    }

    function renderFormationOptions() {
      formationList.innerHTML = formations.map((f) => `
        <button class="formation-btn ${selectedFormation.id === f.id ? "active" : ""}" data-id="${f.id}">
          <span class="formation-title">${f.name}</span>
          <span class="formation-desc">${f.desc}</span>
        </button>
      `).join("");
    }

    function pickUniqueCards(count) {
      const pool = [...tarotDeck];
      const picked = [];
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        const card = pool.splice(idx, 1)[0];
        picked.push({
          ...card,
          orientation: Math.random() < 0.5 ? "逆位" : "正位",
          position: formationPositions[selectedFormation.id][i] || `位置${i + 1}`
        });
      }
      return picked;
    }

    function symbolForCard(card) {
      return CARD_SYMBOL_SVG[card.name] || CARD_SYMBOL_SVG.__default;
    }

    function renderCards(cards) {
      const html = cards.map((card) => `
        <article class="tarot-card">
          <div class="card-inner">
            <div class="card-face card-back">
              ${CARD_BACK_ORNAMENT}
              <div>ARCANA</div>
              <div style="margin-top:8px;font-size:11px;opacity:.78;letter-spacing:.22em">✦ ✧ ✦</div>
            </div>
            <div class="card-face card-front">
              <div class="card-orient">${card.position}</div>
              <div class="card-symbol-wrap">${symbolForCard(card)}</div>
              <div class="card-name">${card.name}</div>
              <div class="card-orient">${card.orientation} · ${card.meaning}</div>
            </div>
          </div>
        </article>
      `).join("");
      cardBox.innerHTML = `<div class="card-grid">${html}</div>`;
    }

    function flipAllCards() {
      const grid = cardBox.querySelector(".card-grid");
      if (!grid) return;
      grid.classList.add("revealed");
      const cards = [...grid.querySelectorAll(".tarot-card")];
      cards.forEach((el, index) => {
        setTimeout(() => el.classList.add("flipped"), 420 + index * 120);
      });
    }

    async function drawCards() {
      if (drawing) return;
      drawing = true;
      drawBtn.disabled = true;
      readingBtn.disabled = true;
      readingResult.textContent = "正在洗牌与抽牌，请稍候...";
      cardBox.innerHTML = "<div class='card-state'>正在洗牌中...</div>";
      proverbBox.style.display = "none";
      proverbBox.classList.remove("show");
      proverbBox.textContent = "";

      deckStack.classList.add("show");
      await new Promise((r) => setTimeout(r, 1200));
      currentCards = pickUniqueCards(selectedFormation.count);
      renderCards(currentCards);
      await new Promise((r) => setTimeout(r, 180));
      flipAllCards();
      await new Promise((r) => setTimeout(r, 700 + currentCards.length * 120));
      deckStack.classList.remove("show");

      try {
        const proverb = await generateProverb(currentCards);
        proverbBox.textContent = `“${normalizeProverbText(proverb)}”`;
      } catch {
        proverbBox.textContent = "“星辉低语，答案在你心间”";
      }
      proverbBox.style.display = "flex";

      readingResult.textContent = `已完成${selectedFormation.name}，点击“查看AI解读（0.9元）”继续。`;
      readingBtn.disabled = false;
      drawBtn.disabled = false;
      drawing = false;
    }

    function openPayModal() {
      payModal.classList.add("show");
    }

    function closePayModal() {
      payModal.classList.remove("show");
    }

    function buildPrompt(question, cards) {
      const names = cardNameList(cards);
      return `你是一位神秘的塔罗占卜师，用户的问题是：${question}，抽到的牌是：${names}，请用古典优雅的语气给出深刻的占卜解读，200字左右`;
    }

    function localMockReading(question, cards) {
      const cardSummary = cards
        .map((c, i) => `${i + 1}）${c.position} - ${c.name}${c.orientation}`)
        .join("\n");
      const orientHint = cards.some((c) => c.orientation === "逆位")
        ? "牌阵中出现逆位，说明节奏需要微调与回看。"
        : "牌阵多为正位，整体推进力和清晰度较高。";
      return `【一句话总评】
围绕“${question}”，${selectedFormation.name}显示：关键不在急于求成，而在你如何组织行动与心态。

【牌阵展开】
${cardSummary}

【当前能量状态】
${orientHint}
你可能正处在“想马上确认结果”与“还需要再观察”之间，真正的突破点是先明确你最看重的一个标准。

【未来7天行动建议】
1）把问题拆成一个可验证的小步骤，在48小时内完成一次试探行动。
2）每天用10分钟记录直觉和现实反馈，避免情绪替你做决定。
3）与一位可信任的人对话一次，借外部视角校准盲区。

【星盘密语】
当你对齐内在意图，命运会在细节里给你回应。`;
    }

    async function fetchDeepSeekReading(question, cards) {
      // 统一走 SiliconFlow 的 DeepSeek-R1
      const prompt = buildPrompt(question, cards);
      const text = await siliconFlowChat({
        model: "deepseek-ai/DeepSeek-R1",
        prompt,
        temperature: 0.7,
        max_tokens: 420
      });
      if (text) return text;
      await new Promise((r) => setTimeout(r, 650));
      return localMockReading(question, cards);
    }

    async function handleRead() {
      const question = questionInput.value.trim();
      if (!question) {
        alert("请先输入你想占卜的问题。");
        questionInput.focus();
        return;
      }
      if (!currentCards.length) {
        alert("请先完成抽牌。");
        return;
      }

      readingResult.textContent = "已确认付款，正在生成 AI 解读...";
      readingBtn.disabled = true;

      try {
        const text = await fetchDeepSeekReading(question, currentCards);
        readingResult.textContent = text;
      } catch (err) {
        readingResult.textContent = `AI解读暂时不可用，已为你切换本地解读。\n\n${localMockReading(question, currentCards)}`;
      } finally {
        readingBtn.disabled = false;
      }
    }

    formationList.addEventListener("click", (e) => {
      const btn = e.target.closest(".formation-btn");
      if (!btn) return;
      const picked = formations.find((f) => f.id === btn.dataset.id);
      if (!picked) return;
      selectedFormation = picked;
      renderFormationOptions();
      currentCards = [];
      cardBox.innerHTML = "<div class='card-state'>牌阵已切换，请重新抽牌。</div>";
      readingBtn.disabled = true;
    });

    drawBtn.addEventListener("click", drawCards);

    readingBtn.addEventListener("click", () => {
      const question = questionInput.value.trim();
      if (!question) {
        alert("请先输入问题，再查看AI解读。");
        questionInput.focus();
        return;
      }
      if (!currentCards.length) {
        alert("请先抽牌。");
        return;
      }
      openPayModal();
    });

    cancelPay.addEventListener("click", closePayModal);

    confirmPay.addEventListener("click", async () => {
      closePayModal();
      await handleRead();
    });

    payModal.addEventListener("click", (e) => {
      if (e.target === payModal) closePayModal();
    });

    alipayQr.addEventListener("error", () => {
      alipayQr.style.display = "none";
      alipayQrFallback.style.display = "block";
    });

    createParticles();
    createSandFlow(panelSandLayer, 150);
    createSandFlow(mandalaSandLayer, 130);
    startMobileAnimationLoop();
    renderFormationOptions();
  </script>
</body>
</html>
