<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <title>塔罗占卜 · 星盘密语</title>
  <style>
    :root {
      --bg: #07050b;
      --panel: rgba(15, 11, 28, 0.72);
      --border: rgba(214, 171, 88, 0.3);
      --text: #f1e8d2;
      --muted: #c9bfa6;
      --accent: #d6ab58;
      --accent-2: #8c6a31;
      --danger: #ff98b6;
      --ok: #7ff5c6;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(130, 10, 40, 0.26), transparent 42%),
        radial-gradient(circle at 84% 10%, rgba(94, 8, 28, 0.2), transparent 44%),
        linear-gradient(160deg, #4a0010 0%, #1a0008 100%);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(244,218,160,.38), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 25%, rgba(212,175,106,.32), transparent 60%),
        radial-gradient(1.8px 1.8px at 40% 70%, rgba(90,8,28,.35), transparent 60%),
        radial-gradient(1.2px 1.2px at 85% 60%, rgba(212,175,106,.22), transparent 60%);
      pointer-events: none;
      opacity: .55;
    }

    .particle-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      top: -10px;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      left: var(--x);
      background: radial-gradient(circle,
        rgba(255,236,200,.95) 0%,
        rgba(214,171,88,.65) 38%,
        rgba(90,8,28,.35) 68%,
        transparent 78%);
      filter: blur(.15px);
      opacity: .75;
      animation:
        fall var(--dur) linear infinite,
        twinkle var(--tw) ease-in-out infinite;
      animation-delay: var(--delay), calc(var(--delay) * -0.3);
      will-change: transform, opacity;
    }

    .particle--trail {
      box-shadow:
        0 0 10px 2px rgba(214, 171, 88, 0.55),
        0 0 4px rgba(90, 8, 28, 0.35),
        0 22px 28px -8px rgba(214, 171, 88, 0.22);
    }

    .particle--trail::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 55%;
      width: 2px;
      height: calc(var(--size) * 8);
      transform: translateX(-50%);
      background: linear-gradient(
        to bottom,
        rgba(214, 171, 88, 0.55),
        rgba(74, 0, 16, 0.15),
        transparent
      );
      border-radius: 2px;
      opacity: .55;
      filter: blur(1.2px);
      pointer-events: none;
    }

    @keyframes fall {
      0% { transform: translate3d(0, -12px, 0); opacity: 0; }
      10% { opacity: var(--peak, 0.85); }
      78% { opacity: calc(var(--peak, 0.85) * 0.85); }
      100% { transform: translate3d(var(--drift), 105vh, 0); opacity: 0; }
    }

    @keyframes twinkle {
      0%, 100% {
        filter: blur(0.35px) brightness(0.7) drop-shadow(0 0 0 rgba(212, 175, 106, 0));
      }
      50% {
        filter: blur(0.05px) brightness(1.35) drop-shadow(0 0 6px rgba(212, 175, 106, 0.55));
      }
    }

    .container {
      width: min(940px, calc(100vw - 32px));
      margin: 24px auto 40px;
      position: relative;
      z-index: 1;
    }

    .title {
      text-align: center;
      margin: 8px 0 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-shadow: 0 0 16px rgba(214, 171, 88, 0.45);
      font-family: "Cinzel", "Times New Roman", "Georgia", serif;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      font-family: "ZCOOL XiaoWei", "PingFang SC", "Microsoft YaHei", serif;
      letter-spacing: 0.08em;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 16px;
    }

    .panel + .panel { margin-top: 14px; }

    .zodiac {
      width: 260px;
      aspect-ratio: 1 / 1;
      border: 1px dashed rgba(212, 175, 106, 0.38);
      border-radius: 50%;
      margin: 4px auto 16px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 0 50px rgba(74, 0, 16, 0.35),
        inset 0 0 24px rgba(214, 171, 88, 0.08),
        0 0 42px rgba(0, 0, 0, 0.55);
    }

    .mandala-bg {
      position: absolute;
      inset: -6%;
      width: 112%;
      height: 112%;
      pointer-events: none;
      opacity: 0.42;
      mix-blend-mode: screen;
      animation: mandalaDrift 48s linear infinite;
    }

    @keyframes mandalaDrift {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1); }
    }

    .zodiac::before, .zodiac::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      border: 1px solid rgba(120, 60, 80, 0.45);
      z-index: 1;
    }

    .zodiac::after {
      inset: 30%;
      border-color: rgba(212, 175, 106, 0.35);
    }

    .zodiac i {
      position: absolute;
      z-index: 2;
      width: 4px;
      height: 4px;
      background: rgba(244, 218, 160, 0.9);
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(214, 171, 88, 0.75);
    }

    .q-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 88px;
      background: rgba(8, 7, 16, 0.75);
      color: var(--text);
      border: 1px solid rgba(214, 171, 88, 0.32);
      border-radius: 12px;
      padding: 12px;
      resize: vertical;
      outline: none;
      font-size: 14px;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(214, 171, 88, .15); }

    .actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 1px solid rgba(214, 171, 88, 0.55);
      background: linear-gradient(135deg, rgba(214, 171, 88, .22), rgba(73, 53, 24, .25));
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .2s ease, border-color .2s ease;
      font-weight: 600;
    }

    button:hover { transform: translateY(-1px); border-color: var(--accent); box-shadow: 0 8px 18px rgba(214, 171, 88, .2); }
    button:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .card-wrap {
      margin-top: 8px;
      min-height: 280px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      align-items: center;
    }

    .tarot-card {
      width: 100%;
      min-height: 240px;
      border-radius: 14px;
      border: 2px solid rgba(212, 175, 106, 0.72);
      background:
        radial-gradient(ellipse 120% 90% at 18% 12%, rgba(212, 175, 106, 0.14), transparent 52%),
        radial-gradient(ellipse 85% 70% at 88% 78%, rgba(74, 0, 16, 0.42), transparent 48%),
        radial-gradient(circle at 50% 110%, rgba(26, 0, 8, 0.9), transparent 55%),
        linear-gradient(168deg, #1c0a10 0%, #12060c 38%, #0a0408 100%);
      padding: 16px;
      position: relative;
      box-shadow:
        inset 0 0 0 1px rgba(74, 0, 16, 0.55),
        inset 0 0 48px rgba(0, 0, 0, 0.55),
        inset 0 -20px 40px rgba(74, 0, 16, 0.25),
        0 0 0 1px rgba(212, 175, 106, 0.12),
        0 18px 36px rgba(0, 0, 0, 0.6);
      perspective: 1000px;
    }

    .tarot-card::after {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: 9px;
      bottom: 9px;
      border: 1px solid rgba(212, 175, 106, 0.42);
      border-radius: 10px;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(212, 175, 106, 0.12) 0%, transparent 32%, transparent 68%, rgba(74, 0, 16, 0.22) 100%);
    }

    .card-inner {
      position: absolute;
      inset: 14px;
      transform-style: preserve-3d;
      transition: transform .8s cubic-bezier(.2,.7,.2,1);
    }

    .tarot-card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      backface-visibility: hidden;
      border: 1px solid rgba(212, 175, 106, 0.28);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px;
      overflow: hidden;
    }

    .card-face::before {
      content: "";
      position: absolute;
      inset: 6px;
      z-index: 0;
      border-radius: 6px;
      pointer-events: none;
      border: 1px solid rgba(74, 0, 16, 0.35);
      box-shadow:
        inset 0 0 0 1px rgba(212, 175, 106, 0.15),
        inset 0 0 24px rgba(0, 0, 0, 0.35);
    }

    .card-face::after {
      content: "";
      position: absolute;
      inset: 10px;
      z-index: 0;
      border-radius: 4px;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 5px,
          rgba(212, 175, 106, 0.04) 5px,
          rgba(212, 175, 106, 0.04) 6px
        );
      opacity: 0.35;
      mix-blend-mode: overlay;
    }

    .card-face > * {
      position: relative;
      z-index: 1;
    }

    .card-back {
      position: relative;
      background:
        radial-gradient(ellipse 80% 60% at 30% 25%, rgba(212, 175, 106, 0.16), transparent 55%),
        radial-gradient(ellipse 90% 70% at 70% 70%, rgba(74, 0, 16, 0.45), transparent 50%),
        linear-gradient(165deg, #140810 0%, #0a0408 100%);
      align-items: center;
      color: #e7d6ab;
      font-family: "Cinzel", "Times New Roman", serif;
      letter-spacing: .15em;
      font-size: 13px;
    }

    .card-back .card-back-ornament {
      position: relative;
      z-index: 1;
      width: 56px;
      height: 56px;
      margin-bottom: 10px;
      opacity: 0.85;
      filter: drop-shadow(0 0 10px rgba(212, 175, 106, 0.35));
    }

    .card-front {
      transform: rotateY(180deg);
      background:
        radial-gradient(ellipse 95% 75% at 72% 18%, rgba(212, 175, 106, 0.12), transparent 45%),
        radial-gradient(ellipse 70% 60% at 18% 88%, rgba(74, 0, 16, 0.38), transparent 48%),
        linear-gradient(168deg, #1a0c12 0%, #10060a 55%, #0c0408 100%);
    }

    .card-state {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      margin-top: 58px;
    }

    .card-symbol-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      margin: 6px 0;
    }

    .card-symbol {
      width: 56px;
      height: 56px;
      display: block;
      filter: drop-shadow(0 0 10px rgba(212, 175, 106, 0.42));
    }

    .card-symbol path,
    .card-symbol circle,
    .card-symbol line,
    .card-symbol polygon {
      stroke: #d4af6a;
      stroke-width: 1.35;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-symbol .sym-fill {
      fill: rgba(212, 175, 106, 0.12);
      stroke: #c9a052;
      stroke-width: 1;
    }

    .card-name {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .12em;
      margin-top: 4px;
      font-family: "Cinzel", "Times New Roman", "Georgia", serif;
      text-transform: uppercase;
      color: #f3e6c8;
      text-shadow: 0 0 14px rgba(212, 175, 106, 0.35);
    }

    .card-orient {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .reading {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #f4efff;
      margin-top: 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.62);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 16px;
    }

    .modal.show { display: flex; }

    .modal-content {
      width: min(420px, 100%);
      background: rgba(14, 10, 28, .95);
      border: 1px solid rgba(162, 123, 255, .45);
      border: 1px solid rgba(214, 171, 88, .45);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: .04em;
    }

    .price {
      color: var(--danger);
      font-weight: 700;
      margin: 8px 0 10px;
    }

    .modal-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .ghost { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); }

    .tag-ok {
      display: inline-block;
      font-size: 12px;
      color: #09160f;
      background: var(--ok);
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .formation-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .formation-btn {
      text-align: left;
      min-height: 78px;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1.35;
      transition:
        transform 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
    }

    .formation-btn:hover:not(.active) {
      transform: translateY(-2px);
      border-color: rgba(228, 201, 122, 0.95);
      box-shadow:
        0 0 28px rgba(212, 175, 106, 0.42),
        0 0 2px rgba(212, 175, 106, 0.9),
        0 10px 22px rgba(0, 0, 0, 0.35);
      background: linear-gradient(145deg, rgba(212, 175, 106, 0.28), rgba(74, 0, 16, 0.32));
    }

    .formation-btn.active {
      border-color: #e4c97a;
      background: linear-gradient(145deg, rgba(212, 175, 106, 0.38), rgba(74, 0, 16, 0.48));
      box-shadow:
        0 0 0 2px rgba(212, 175, 106, 0.75),
        0 0 36px rgba(212, 175, 106, 0.32),
        inset 0 0 26px rgba(74, 0, 16, 0.35);
    }

    .formation-title {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-family: "Cinzel", "Times New Roman", serif;
      font-size: 17px;
      letter-spacing: 0.06em;
    }

    .formation-desc {
      display: block;
      font-size: 14px;
      color: rgba(241, 232, 210, 0.78);
    }

    .entry {
      opacity: 0;
      transform: translateY(12px);
      animation: entryFade .8s ease forwards;
    }

    .entry.delay-1 { animation-delay: .15s; }
    .entry.delay-2 { animation-delay: .35s; }
    .entry.delay-3 { animation-delay: .55s; }
    .entry.delay-4 { animation-delay: .75s; }

    @keyframes entryFade {
      to { opacity: 1; transform: translateY(0); }
    }

    .draw-zone {
      position: relative;
      min-height: 250px;
      border-radius: 12px;
      border: 1px dashed rgba(214,171,88,.28);
      padding: 14px;
      overflow: hidden;
    }

    .deck-stack {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 128px;
      height: 190px;
      opacity: 0;
      pointer-events: none;
    }

    .deck-stack.show {
      opacity: 1;
      animation: pulseDeck .8s ease-in-out infinite alternate;
    }

    .deck-stack .stack-card {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 1px solid rgba(214,171,88,.35);
      background: linear-gradient(160deg, #1a132f, #100c21);
      box-shadow: inset 0 0 12px rgba(214,171,88,.15);
    }

    .deck-stack .stack-card:nth-child(1) { transform: translate(-16px, -10px) rotate(-9deg); }
    .deck-stack .stack-card:nth-child(2) { transform: translate(-8px, -3px) rotate(-3deg); }
    .deck-stack .stack-card:nth-child(3) { transform: translate(0, 0) rotate(0deg); }
    .deck-stack .stack-card:nth-child(4) { transform: translate(8px, 4px) rotate(4deg); }
    .deck-stack .stack-card:nth-child(5) { transform: translate(15px, 9px) rotate(8deg); }

    @keyframes pulseDeck {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.03); }
    }

    .card-grid.revealed .tarot-card {
      animation: cardRise .6s ease both;
    }

    .card-grid.revealed .tarot-card:nth-child(2) { animation-delay: .08s; }
    .card-grid.revealed .tarot-card:nth-child(3) { animation-delay: .16s; }
    .card-grid.revealed .tarot-card:nth-child(4) { animation-delay: .24s; }
    .card-grid.revealed .tarot-card:nth-child(5) { animation-delay: .32s; }
    .card-grid.revealed .tarot-card:nth-child(6) { animation-delay: .40s; }
    .card-grid.revealed .tarot-card:nth-child(7) { animation-delay: .48s; }
    .card-grid.revealed .tarot-card:nth-child(8) { animation-delay: .56s; }
    .card-grid.revealed .tarot-card:nth-child(9) { animation-delay: .64s; }
    .card-grid.revealed .tarot-card:nth-child(10) { animation-delay: .72s; }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 560px) {
      .title { font-size: 26px; }
      .zodiac { width: 220px; }
      .tarot-card { min-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="particle-layer" id="particleLayer" aria-hidden="true"></div>
  <div class="container">
    <h1 class="title entry">Hakuna Matata</h1>
    <p class="subtitle entry delay-1">无忧无虑，梦想成真，一切顺利</p>

    <section class="panel entry delay-2">
      <div class="zodiac" aria-hidden="true">
        <svg class="mandala-bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="mandalaGlow" cx="50%" cy="50%" r="58%">
              <stop offset="0%" stop-color="rgba(212,175,106,0.38)"/>
              <stop offset="45%" stop-color="rgba(90,8,28,0.32)"/>
              <stop offset="100%" stop-color="rgba(26,0,8,0)"/>
            </radialGradient>
            <linearGradient id="mandalaLine" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(212,175,106,0.55)"/>
              <stop offset="50%" stop-color="rgba(140,55,70,0.42)"/>
              <stop offset="100%" stop-color="rgba(74,0,16,0.38)"/>
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="92" fill="url(#mandalaGlow)"/>
          <g fill="none" stroke="url(#mandalaLine)" stroke-width="0.55" stroke-linecap="round" opacity="0.9">
            <circle cx="100" cy="100" r="78"/>
            <circle cx="100" cy="100" r="64"/>
            <circle cx="100" cy="100" r="48"/>
            <circle cx="100" cy="100" r="32"/>
            <circle cx="100" cy="100" r="16"/>
          </g>
          <g fill="rgba(74,0,16,0.14)" stroke="rgba(212,175,106,0.4)" stroke-width="0.45" opacity="0.92">
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(30 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(60 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(90 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(120 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(150 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(180 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(210 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(240 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(270 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(300 100 100)"/>
            <path d="M100 28 C118 52 118 68 100 92 C82 68 82 52 100 28Z" transform="rotate(330 100 100)"/>
          </g>
          <g fill="none" stroke="rgba(212,175,106,0.35)" stroke-width="0.4">
            <path d="M100 100 L154 64 M100 100 L46 64 M100 100 L46 136 M100 100 L154 136 M100 100 L100 24 M100 100 L100 176 M100 100 L26 100 M100 100 L174 100"/>
            <path d="M100 100 L130 48 M100 100 L70 48 M100 100 L70 152 M100 100 L130 152 M100 100 L48 70 M100 100 L152 70 M100 100 L48 130 M100 100 L152 130"/>
          </g>
          <circle cx="100" cy="100" r="5.5" fill="rgba(212,175,106,0.22)" stroke="rgba(212,175,106,0.55)" stroke-width="0.5"/>
        </svg>
        <i style="top:18%;left:52%"></i>
        <i style="top:34%;left:17%"></i>
        <i style="top:72%;left:26%"></i>
        <i style="top:80%;left:63%"></i>
        <i style="top:43%;left:80%"></i>
      </div>
      <label class="q-label" for="questionInput">请输入你想占卜的问题</label>
      <textarea id="questionInput" placeholder="例如：我最近是否适合换工作？"></textarea>

      <div style="margin-top:12px">
        <span class="q-label" style="margin-bottom:6px">请选择牌阵类型</span>
        <div id="formationList" class="formation-list"></div>
      </div>

      <div class="actions">
        <button id="drawBtn">抽牌并翻牌</button>
        <button id="readingBtn" disabled>查看AI解读（0.9元）</button>
      </div>
      <div class="hint">当前为静态页面演示：点击“查看AI解读”后将模拟支付成功，再调用 DeepSeek API（如未配置 API Key 会使用本地模拟解读）。</div>
    </section>

    <section class="panel card-wrap entry delay-3">
      <div id="drawZone" class="draw-zone">
        <div id="deckStack" class="deck-stack" aria-hidden="true">
          <div class="stack-card"></div>
          <div class="stack-card"></div>
          <div class="stack-card"></div>
          <div class="stack-card"></div>
          <div class="stack-card"></div>
        </div>
        <div id="cardBox" class="card-state">等待抽牌中...</div>
      </div>
    </section>

    <section class="panel entry delay-4">
      <div id="readingResult" class="reading">AI解读将显示在这里。</div>
    </section>
  </div>

  <div id="payModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
      <h2 class="modal-title">解锁 AI 深度解读</h2>
      <div class="price">支付金额：￥0.9</div>
      <div style="color: var(--muted); font-size: 14px;">
        说明：当前版本为演示版，点击“立即支付”将模拟支付成功流程。
      </div>
      <div class="modal-row">
        <button id="cancelPay" class="ghost">取消</button>
        <button id="confirmPay">立即支付</button>
      </div>
    </div>
  </div>

  <script>
    const formations = [
      { id: "single", name: "单张牌", desc: "每日指引", count: 1 },
      { id: "three", name: "三张牌阵", desc: "过去·现在·未来", count: 3 },
      { id: "celtic", name: "凯尔特十字牌阵", desc: "全局深入分析（10张）", count: 10 },
      { id: "message", name: "传讯牌阵", desc: "当下讯息·阻碍·建议", count: 3 }
    ];

    const formationPositions = {
      single: ["今日指引"],
      three: ["过去", "现在", "未来"],
      celtic: ["核心", "阻碍", "显意识", "潜意识", "过去基础", "近期走向", "你的位置", "环境影响", "希望/恐惧", "最终趋势"],
      message: ["宇宙讯息", "当前阻碍", "行动建议"]
    };

    const CARD_SYMBOL_SVG = {
      "愚者": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M18 46c6-14 10-22 16-22s10 8 16 22"/><circle cx="32" cy="18" r="5" class="sym-fill"/><path d="M26 50h12"/><path d="M20 54l4-4m16 4l-4-4"/></svg>`,
      "魔术师": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M14 34c6-10 10-14 18-14s12 4 18 14"/><path d="M20 22v20M44 22v20"/><path d="M26 30h12"/><circle cx="32" cy="44" r="4" class="sym-fill"/></svg>`,
      "女祭司": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M32 12c-8 8-14 18-14 28a14 14 0 0 0 28 0c0-10-6-20-14-28z" class="sym-fill"/><path d="M32 22v18"/><circle cx="32" cy="38" r="3"/></svg>`,
      "皇后": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M20 44c4-16 8-24 12-24s8 8 12 24"/><path d="M16 26l8-6 8 6 8-6 8 6"/><circle cx="32" cy="22" r="5" class="sym-fill"/></svg>`,
      "皇帝": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="22" y="18" width="20" height="14" rx="2" class="sym-fill"/><path d="M18 34h28v6H18z"/><path d="M24 40v10M32 40v12M40 40v10"/></svg>`,
      "恋人": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M22 46c0-10 6-16 10-16s10 6 10 16"/><path d="M42 46c0-10-6-16-10-16s-10 6-10 16"/><path d="M32 20v10"/><path d="M26 24c4-4 10-4 12 0"/><circle cx="32" cy="18" r="4" class="sym-fill"/></svg>`,
      "战车": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M16 38h32l-4-14H20z" class="sym-fill"/><circle cx="24" cy="42" r="5"/><circle cx="40" cy="42" r="5"/><path d="M32 14l6 10h-12z"/></svg>`,
      "力量": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="30" r="10" class="sym-fill"/><path d="M36 26c8 6 12 14 12 22"/><path d="M22 40c6-2 10-2 14 0"/></svg>`,
      "隐者": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M32 16v34"/><circle cx="32" cy="14" r="4" class="sym-fill"/><rect x="26" y="30" width="12" height="16" rx="2"/><path d="M20 48l12-6 12 6"/></svg>`,
      "命运之轮": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="18"/><circle cx="32" cy="32" r="10" class="sym-fill"/><path d="M32 14v36M14 32h36"/><circle cx="32" cy="32" r="3"/></svg>`,
      "正义": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M20 46h24"/><path d="M32 16v28"/><path d="M22 24h20l-10 14z" class="sym-fill"/></svg>`,
      "倒吊人": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="18" r="5" class="sym-fill"/><path d="M40 22v26"/><path d="M28 32c8-4 16-2 22 4"/><path d="M34 48h14"/></svg>`,
      "死神": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M44 16L20 50"/><circle cx="34" cy="30" r="12" class="sym-fill"/><path d="M24 44h16"/></svg>`,
      "节制": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M22 18v28"/><path d="M42 18v28"/><path d="M26 32c6 6 12 6 16 0"/><circle cx="32" cy="32" r="4" class="sym-fill"/></svg>`,
      "恶魔": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M22 22h20v20H22z" class="sym-fill"/><path d="M18 26h4v12h-4zM42 26h4v12h-4z"/><path d="M26 42c4 4 8 4 12 0"/></svg>`,
      "高塔": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M24 46V22l8-8 8 8v24"/><path d="M28 30h8M30 38h8"/><path d="M18 18l28 8M16 48h32"/></svg>`,
      "星星": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M32 10l4 12 12 4-12 4-4 12-4-12-12-4 12-4z" class="sym-fill"/><circle cx="22" cy="44" r="2"/><circle cx="42" cy="48" r="2"/><circle cx="32" cy="50" r="2"/></svg>`,
      "月亮": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M40 18a14 14 0 1 0 0 28 10 10 0 0 1 0-28z" class="sym-fill"/><path d="M22 48c4-6 4-12 0-18"/><circle cx="26" cy="26" r="2" opacity=".7"/><circle cx="34" cy="34" r="2" opacity=".5"/></svg>`,
      "太阳": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="12" class="sym-fill"/><path d="M32 12v6M32 46v6M12 32h6M46 32h6M17 17l5 5M42 42l-5-5M47 17l-5 5M22 42l5-5"/></svg>`,
      "审判": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M22 44c4-18 8-26 10-26s6 8 10 26"/><path d="M18 20h28"/><path d="M32 14v4"/></svg>`,
      "世界": `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="18" class="sym-fill"/><ellipse cx="32" cy="32" rx="10" ry="18"/><ellipse cx="32" cy="32" rx="18" ry="10"/><circle cx="32" cy="32" r="4"/></svg>`,
      __default: `<svg class="card-symbol" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="22"/><circle cx="32" cy="32" r="10" class="sym-fill"/><path d="M32 10v44M10 32h44"/></svg>`
    };

    const CARD_BACK_ORNAMENT = `<svg class="card-back-ornament" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="32" cy="32" r="26" fill="none" stroke="rgba(212,175,106,0.42)" stroke-width="1"/><path d="M32 10l6 14 14 6-14 6-6 14-6-14-14-6 14-6z" fill="none" stroke="rgba(212,175,106,0.5)" stroke-width="1"/><circle cx="32" cy="32" r="4" fill="rgba(212,175,106,0.12)" stroke="rgba(212,175,106,0.45)" stroke-width="0.8"/></svg>`;

    const tarotDeck = [
      { name: "愚者", meaning: "新的开始、冒险、可能性" },
      { name: "魔术师", meaning: "创造力、行动力、掌控局面" },
      { name: "女祭司", meaning: "直觉、潜意识、内在智慧" },
      { name: "皇后", meaning: "丰盛、滋养、吸引力" },
      { name: "皇帝", meaning: "秩序、责任、稳定结构" },
      { name: "恋人", meaning: "关系、选择、价值一致" },
      { name: "战车", meaning: "意志、推进、胜利" },
      { name: "力量", meaning: "勇气、耐心、温柔掌控" },
      { name: "隐者", meaning: "反思、独处、寻找答案" },
      { name: "命运之轮", meaning: "转机、周期、变化到来" },
      { name: "正义", meaning: "平衡、因果、理性判断" },
      { name: "倒吊人", meaning: "暂停、换位思考、等待" },
      { name: "死神", meaning: "结束与重生、蜕变" },
      { name: "节制", meaning: "协调、修复、适度" },
      { name: "恶魔", meaning: "束缚、执念、欲望" },
      { name: "高塔", meaning: "突变、真相揭露、重建" },
      { name: "星星", meaning: "希望、疗愈、信念" },
      { name: "月亮", meaning: "迷雾、情绪、未知" },
      { name: "太阳", meaning: "成功、清晰、生命力" },
      { name: "审判", meaning: "觉醒、召唤、重新选择" },
      { name: "世界", meaning: "完成、整合、阶段圆满" }
    ];

    const DEEPSEEK_API_URL = "https://api.deepseek.com/chat/completions";
    // 可选：把你的 DeepSeek Key 填在这里测试真实调用；不填则自动走本地模拟。
    const DEEPSEEK_API_KEY = "";

    const questionInput = document.getElementById("questionInput");
    const drawBtn = document.getElementById("drawBtn");
    const readingBtn = document.getElementById("readingBtn");
    const cardBox = document.getElementById("cardBox");
    const readingResult = document.getElementById("readingResult");
    const payModal = document.getElementById("payModal");
    const cancelPay = document.getElementById("cancelPay");
    const confirmPay = document.getElementById("confirmPay");

    const formationList = document.getElementById("formationList");
    const drawZone = document.getElementById("drawZone");
    const deckStack = document.getElementById("deckStack");
    const particleLayer = document.getElementById("particleLayer");

    let currentCards = [];
    let selectedFormation = formations[0];
    let drawing = false;

    function createParticles() {
      const count = 80;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("span");
        const trail = Math.random() < 0.35;
        p.className = "particle" + (trail ? " particle--trail" : "");
        p.style.setProperty("--x", `${Math.random() * 100}%`);
        p.style.setProperty("--size", `${Math.random() * 4.5 + 1}px`);
        p.style.setProperty("--dur", `${Math.random() * 14 + 10}s`);
        p.style.setProperty("--delay", `${Math.random() * -18}s`);
        p.style.setProperty("--drift", `${Math.random() * 90 - 45}px`);
        p.style.setProperty("--tw", `${Math.random() * 2.8 + 0.9}s`);
        p.style.setProperty("--peak", `${0.55 + Math.random() * 0.45}`);
        particleLayer.appendChild(p);
      }
    }

    function renderFormationOptions() {
      formationList.innerHTML = formations.map((f) => `
        <button class="formation-btn ${selectedFormation.id === f.id ? "active" : ""}" data-id="${f.id}">
          <span class="formation-title">${f.name}</span>
          <span class="formation-desc">${f.desc}</span>
        </button>
      `).join("");
    }

    function pickUniqueCards(count) {
      const pool = [...tarotDeck];
      const picked = [];
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        const card = pool.splice(idx, 1)[0];
        picked.push({
          ...card,
          orientation: Math.random() < 0.5 ? "逆位" : "正位",
          position: formationPositions[selectedFormation.id][i] || `位置${i + 1}`
        });
      }
      return picked;
    }

    function symbolForCard(card) {
      return CARD_SYMBOL_SVG[card.name] || CARD_SYMBOL_SVG.__default;
    }

    function renderCards(cards) {
      const html = cards.map((card) => `
        <article class="tarot-card">
          <div class="card-inner">
            <div class="card-face card-back">
              ${CARD_BACK_ORNAMENT}
              <div>ARCANA</div>
              <div style="margin-top:8px;font-size:11px;opacity:.78;letter-spacing:.22em">✦ ✧ ✦</div>
            </div>
            <div class="card-face card-front">
              <div class="card-orient">${card.position}</div>
              <div class="card-symbol-wrap">${symbolForCard(card)}</div>
              <div class="card-name">${card.name}</div>
              <div class="card-orient">${card.orientation} · ${card.meaning}</div>
            </div>
          </div>
        </article>
      `).join("");
      cardBox.innerHTML = `<div class="card-grid">${html}</div>`;
    }

    function flipAllCards() {
      const grid = cardBox.querySelector(".card-grid");
      if (!grid) return;
      grid.classList.add("revealed");
      const cards = [...grid.querySelectorAll(".tarot-card")];
      cards.forEach((el, index) => {
        setTimeout(() => el.classList.add("flipped"), 420 + index * 120);
      });
    }

    async function drawCards() {
      if (drawing) return;
      drawing = true;
      drawBtn.disabled = true;
      readingBtn.disabled = true;
      readingResult.textContent = "正在洗牌与抽牌，请稍候...";
      cardBox.innerHTML = "<div class='card-state'>正在洗牌中...</div>";

      deckStack.classList.add("show");
      await new Promise((r) => setTimeout(r, 1200));
      currentCards = pickUniqueCards(selectedFormation.count);
      renderCards(currentCards);
      await new Promise((r) => setTimeout(r, 180));
      flipAllCards();
      await new Promise((r) => setTimeout(r, 700 + currentCards.length * 120));
      deckStack.classList.remove("show");

      readingResult.textContent = `已完成${selectedFormation.name}，点击“查看AI解读（0.9元）”继续。`;
      readingBtn.disabled = false;
      drawBtn.disabled = false;
      drawing = false;
    }

    function openPayModal() {
      payModal.classList.add("show");
    }

    function closePayModal() {
      payModal.classList.remove("show");
    }

    function buildPrompt(question, cards) {
      const cardText = cards
        .map((c, idx) => `${idx + 1}. ${c.position}：${c.name}（${c.orientation}）- ${c.meaning}`)
        .join("\n");
      return `你是一位专业塔罗师。请基于以下信息给出温和、具体、可执行的中文解读。
用户问题：${question}
牌阵类型：${selectedFormation.name}（${selectedFormation.desc}）
抽到的牌：
${cardText}
要求：
1. 先给一个一句话总评；
2. 分析当前能量状态；
3. 按牌阵顺序逐张解读，每张1-2句；
4. 给出接下来7天可执行的3条建议；
4. 语气神秘但不过度夸张，避免绝对化结论。`;
    }

    function localMockReading(question, cards) {
      const cardSummary = cards
        .map((c, i) => `${i + 1}）${c.position} - ${c.name}${c.orientation}`)
        .join("\n");
      const orientHint = cards.some((c) => c.orientation === "逆位")
        ? "牌阵中出现逆位，说明节奏需要微调与回看。"
        : "牌阵多为正位，整体推进力和清晰度较高。";
      return `【一句话总评】
围绕“${question}”，${selectedFormation.name}显示：关键不在急于求成，而在你如何组织行动与心态。

【牌阵展开】
${cardSummary}

【当前能量状态】
${orientHint}
你可能正处在“想马上确认结果”与“还需要再观察”之间，真正的突破点是先明确你最看重的一个标准。

【未来7天行动建议】
1）把问题拆成一个可验证的小步骤，在48小时内完成一次试探行动。
2）每天用10分钟记录直觉和现实反馈，避免情绪替你做决定。
3）与一位可信任的人对话一次，借外部视角校准盲区。

【星盘密语】
当你对齐内在意图，命运会在细节里给你回应。`;
    }

    async function fetchDeepSeekReading(question, cards) {
      if (!DEEPSEEK_API_KEY) {
        await new Promise((r) => setTimeout(r, 700));
        return localMockReading(question, cards);
      }

      const resp = await fetch(DEEPSEEK_API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [
            { role: "system", content: "你是专业塔罗咨询助手，擅长在同理心框架下提供启发式建议。" },
            { role: "user", content: buildPrompt(question, cards) }
          ],
          temperature: 0.85
        })
      });

      if (!resp.ok) {
        throw new Error(`DeepSeek 请求失败：HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const text = data?.choices?.[0]?.message?.content?.trim();
      if (!text) {
        throw new Error("DeepSeek 返回内容为空");
      }
      return text;
    }

    async function handleRead() {
      const question = questionInput.value.trim();
      if (!question) {
        alert("请先输入你想占卜的问题。");
        questionInput.focus();
        return;
      }
      if (!currentCards.length) {
        alert("请先完成抽牌。");
        return;
      }

      readingResult.innerHTML = "支付成功<span class='tag-ok'>模拟</span>，正在连接 AI 解读...";
      readingBtn.disabled = true;

      try {
        const text = await fetchDeepSeekReading(question, currentCards);
        readingResult.textContent = text;
      } catch (err) {
        readingResult.textContent = `AI解读暂时不可用，已为你切换本地解读。\n\n${localMockReading(question, currentCards)}`;
      } finally {
        readingBtn.disabled = false;
      }
    }

    formationList.addEventListener("click", (e) => {
      const btn = e.target.closest(".formation-btn");
      if (!btn) return;
      const picked = formations.find((f) => f.id === btn.dataset.id);
      if (!picked) return;
      selectedFormation = picked;
      renderFormationOptions();
      currentCards = [];
      cardBox.innerHTML = "<div class='card-state'>牌阵已切换，请重新抽牌。</div>";
      readingBtn.disabled = true;
    });

    drawBtn.addEventListener("click", drawCards);

    readingBtn.addEventListener("click", () => {
      const question = questionInput.value.trim();
      if (!question) {
        alert("请先输入问题，再查看AI解读。");
        questionInput.focus();
        return;
      }
      if (!currentCards.length) {
        alert("请先抽牌。");
        return;
      }
      openPayModal();
    });

    cancelPay.addEventListener("click", closePayModal);

    confirmPay.addEventListener("click", async () => {
      closePayModal();
      await handleRead();
    });

    payModal.addEventListener("click", (e) => {
      if (e.target === payModal) closePayModal();
    });

    createParticles();
    renderFormationOptions();
  </script>
</body>
</html>
